name: Update Build Version

on:
  push:
    branches:
      - main-clean

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main-clean
          fetch-depth: 0

      - name: Calculate version info
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_NUMBER=$(git rev-list --count HEAD)
          FULL_SHA=$(git rev-parse HEAD)
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${FULL_SHA}"
          
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          echo "COMMIT_URL=${COMMIT_URL}" >> $GITHUB_OUTPUT

      - name: Update version.json
        run: |
          cat > version.json <<EOF
          {
            "buildNumber" : "${{ steps.version.outputs.BUILD_NUMBER }}",
            "shortSha": "${{ steps.version.outputs.SHORT_SHA }}",
            "commitURL": "${{ steps.version.outputs.COMMIT_URL }}"
          }
          EOF

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update build version [skip ci]"
          file_pattern: version.json
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
