name: Update Build Version

on:
  push:
    branches:
      - main-clean

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get commit info and update
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_NUMBER=$(git rev-list --count HEAD)
          FULL_SHA=$(git rev-parse HEAD)
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${FULL_SHA}"
          
          echo "Atualizando com:"
          echo "Build: ${BUILD_NUMBER}"
          echo "Commit: ${SHORT_SHA}"
          echo "URL: ${COMMIT_URL}"
          
          sed -i "s|BUILD_VERSION|Build ${BUILD_NUMBER}|g" index.html
          sed -i "s|COMMIT_HASH|${SHORT_SHA}|g" index.html
          sed -i "s|COMMIT_URL|${COMMIT_URL}|g" index.html
          
          echo "✓ Atualização concluída"

      - name: Commit and push changes
        run: |
          if [ -n "$(git status -s index.html)" ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "ci: update build version [skip ci]"
            git push
          else
            echo "Nenhuma mudança para fazer commit"
          fi
